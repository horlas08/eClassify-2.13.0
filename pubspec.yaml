name: eClassify
description: A classified app


publish_to: 'none' # Remove this line if you wish to publish to pub.dev [Be careful]

version: 1.0.0+2

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  firebase_messaging: ^16.2.2
  youtube_player_flutter: ^9.1.1
  country_picker: ^2.0.26
  connectivity_plus: ^7.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.8.0+1
  image_picker: ^1.1.2
  flutter_bloc: ^9.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  dotted_border: ^3.1.0
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  in_app_review: ^2.0.10
  lottie: ^3.3.1
  mime_type: ^1.0.1
  awesome_notifications: ^0.11.0
  path_provider: ^2.1.5
  record: ^6.2.0
  audioplayers: ^6.4.0
  permission_handler: ^12.0.1
  package_info_plus: ^8.3.0
  any_link_preview: ^3.0.3
  geocoding: ^4.0.0
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^8.0.0
  geolocator: ^14.0.0
  flutter_svg: ^2.2.3
  google_mobile_ads: ^8.0.0
  google_maps_flutter: ^2.14.0
  vibration: ^3.1.3
  device_region: ^1.4.0
  flutter_pdfview: ^1.4.0+1
  video_player: ^2.11.1
  path: ^1.9.1
  device_info_plus: ^12.4.0
  sms_autofill: ^2.4.1
  webview_flutter: ^4.11.0
  flutter_widget_from_html: ^0.17.2
  file_picker: ^11.0.2
  android_intent_plus: 6.0.0
  google_cloud_translation: ^0.0.4

  #payment gateways
  flutter_stripe: ^12.6.0
  in_app_purchase: ^3.2.1
  razorpay_flutter: ^1.4.0
  phonepe_payment_sdk: ^3.0.0
  firebase_app_check: ^0.4.4+1
  collection: ^1.19.1
  open_file: ^3.5.10
  timeago: ^3.7.1
  timeago_flutter: ^3.7.0
  uuid: ^4.5.2
  staggered_grid_view: ^0.0.1
  flutter_libphonenumber: ^2.7.0
  logger: ^2.6.2
  intl: ^0.20.2
  flutter_html_to_pdf_plus: ^0.4.0



dev_dependencies:
  change_app_package_name: ^1.5.0
  curl_logger_dio_interceptor: ^1.0.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  rename: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/branding/
    - assets/icons/illustrators/
    - assets/icons/payment/
    - assets/icons/menu/
    - assets/icons/profile/
    - assets/icons/social/
    - assets/icons/common/
    - assets/languages/
    - assets/lottie/
    - assets/map/


  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
